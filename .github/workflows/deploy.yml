name: deploy-calendar

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '5 15 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: カレンダー生成
        env:
          TZ: Asia/Tokyo
        run: |
          python scripts/build_calendar.py

      - name: Pages 設定
        uses: actions/configure-pages@v5

      - name: 生成物アップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
