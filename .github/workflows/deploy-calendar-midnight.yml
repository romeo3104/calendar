name: deploy-calendar-midnight

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v5

      - name: Python セットアップ
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 依存関係インストール
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests

      - name: カレンダー生成
        env:
          TZ: Asia/Tokyo
        run: |
          python scripts/build_calendar.py

      - name: 世界経済サマリー生成
        env:
          TZ: Asia/Tokyo
        run: |
          python scripts/build_world_summary.py --force

      - name: Pages 設定
        uses: actions/configure-pages@v5

      - name: 生成物アップロード
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
