name: deploy-world-summary

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '10 20 * * *'
    - cron: '10 21 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: world-summary
  cancel-in-progress: true

jobs:
  build-world-summary:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v5

      - name: Python セットアップ
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 依存関係インストール
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests

      - name: 世界経済サマリー生成（push / 手動）
        if: github.event_name != 'schedule'
        env:
          TZ: Asia/Tokyo
        run: |
          python scripts/build_world_summary.py --force

      - name: 世界経済サマリー生成（定期）
        if: github.event_name == 'schedule'
        env:
          TZ: Asia/Tokyo
        run: |
          python scripts/build_world_summary.py
